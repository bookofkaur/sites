name: CI

# Contemporary static-site pipeline:
#  - validates HTML (W3C Nu validator)
#  - audits accessibility / performance / best-practices / SEO with Lighthouse CI
# Runs on every push to main and on every pull request.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  html-validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: W3C Nu HTML validation
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          blacklist: node_modules
          css: true

  lighthouse:
    name: Lighthouse CI (a11y / perf / SEO)
    runs-on: ubuntu-latest
    needs: html-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.15.x
          lhci autorun --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  crosslist-e2e:
    name: Cross-List E2E (mock pair)
    runs-on: ubuntu-latest
    needs: html-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run smoke test against stubbed Claude API
        run: |
          npm install --no-save jsdom
          node tests/crosslist.e2e.mjs

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [html-validate, lighthouse, crosslist-e2e]
    # Only publish from main, and never from PRs.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Photos are git-ignored, so they are not in the checkout and won't ship.
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
